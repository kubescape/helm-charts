{{- $components := fromYaml (include "components" .) }}
{{- if and $components.operator.enabled (eq .Values.capabilities.admissionController "enable") (eq (include "kubescape.certificates.strategy" .) "hook") }}
{{- $registry := .Values.operator.admissionWebhooks.patch.image.registry }}
apiVersion: batch/v1
kind: Job
metadata:
  name:  {{ include "kubescape-admission.name" . }}-create
  namespace: {{ .Values.ksNamespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- include "kubescape-operator.annotations" (dict "Values" .Values) | nindent 4 }}
    {{- with .Values.operator.admissionWebhooks.patch.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    {{- include "kubescape-operator.labels" (dict "Chart" .Chart "Release" .Release "Values" .Values "app" (include "kubescape-admission.name" .) "tier" .Values.global.namespaceTier) | nindent 4 }}
spec:
  ttlSecondsAfterFinished: {{ .Values.operator.admissionWebhooks.patch.ttlSecondsAfterFinished }}
  template:
    metadata:
      name:  {{ include "kubescape-admission.name" . }}-create
{{- with .Values.operator.admissionWebhooks.patch.podAnnotations }}
      annotations:
{{ toYaml .  | indent 8 }}
{{- end }}
      labels:
        {{- include "kubescape-operator.labels" (dict "Chart" .Chart "Release" .Release "Values" .Values "app" (printf "%s-create" (include "kubescape-admission.name" .)) "tier" .Values.global.namespaceTier) | nindent 8 }}
    spec:
      {{- if .Values.operator.admissionWebhooks.patch.priorityClassName }}
      priorityClassName: {{ .Values.operator.admissionWebhooks.patch.priorityClassName }}
      {{- end }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- if kindIs "string" .Values.imagePullSecrets }}
      - name: {{ .Values.imagePullSecrets }}
      {{- else }}
      {{- range .Values.imagePullSecrets }}
      - name: {{ . }}
      {{- end }}
      {{- end }}
      {{- end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: admission-create
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          {{- if .Values.operator.admissionWebhooks.patch.image.sha }}
          image: {{ $registry }}/{{ .Values.operator.admissionWebhooks.patch.image.repository }}:{{ .Values.operator.admissionWebhooks.patch.image.tag }}@sha256:{{ .Values.operator.admissionWebhooks.patch.image.sha }}
          {{- else }}
          image: {{ $registry }}/{{ .Values.operator.admissionWebhooks.patch.image.repository }}:{{ .Values.operator.admissionWebhooks.patch.image.tag }}
          {{- end }}
          imagePullPolicy: {{ .Values.operator.admissionWebhooks.patch.image.pullPolicy }}
          args:
            - create
            - --host={{ include "kubescape-admission.name" . }},{{ include "kubescape-admission.svcDomainName" . }}
            - --namespace={{ .Values.ksNamespace }}
            - --secret-name={{ include "kubescape-admission.secretName" . }}
            - --ca-name=ca.crt
            - --cert-name=tls.crt
            - --key-name=tls.key
          resources:
{{ toYaml .Values.operator.admissionWebhooks.patch.resources | indent 12 }}
      restartPolicy: OnFailure
      serviceAccountName: {{ include "kubescape-admission.name" . }}
      {{- with .Values.operator.admissionWebhooks.patch.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.operator.admissionWebhooks.patch.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.operator.admissionWebhooks.patch.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
{{- end }}
