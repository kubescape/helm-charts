{{- $components := fromYaml (include "components" .) }}
{{- if $components.operator.enabled }}
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Values.operator.name }}
  annotations:
    {{- include "kubescape-operator.annotations" (dict "Values" .Values) | nindent 4 }}
  labels:
    {{- include "kubescape-operator.labels" (dict "Chart" .Chart "Release" .Release "Values" .Values "app" .Values.operator.name "tier" .Values.global.namespaceTier) | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces", "configmaps", "services"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  {{- if .Values.global.enableClusterWideSecretAccess }}
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "watch", "list"]
  {{- end }}
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "watch", "list", "create", "update", "delete" ,"patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["spdx.softwarecomposition.kubescape.io"]
    resources: ["vulnerabilitymanifests", "vulnerabilitymanifestsummaries", "workloadconfigurationscans", "workloadconfigurationscansummaries", "openvulnerabilityexchangecontainers", "containerprofiles", "sbomsyfts"]
    verbs: ["get", "watch", "list", "delete"]
  - apiGroups: ["kubescape.io"]
    resources: ["runtimerulealertbindings"]
    verbs: ["list", "watch", "get"]
  - apiGroups: ["kubescape.io"]
    resources: ["servicesscanresults"]
    verbs: ["get", "watch", "list", "create", "update", "delete" ,"patch"]
  - apiGroups: ["kubescape.io"]
    resources: ["operatorcommands"]
    verbs: ["get", "watch", "list", "create", "update", "patch"]
  - apiGroups: ["kubescape.io"]
    resources: ["operatorcommands/status"]
    verbs: ["get", "watch", "list", "update", "patch"]
  {{- if eq .Values.capabilities.riskAcceptance "enable" }}
  - apiGroups: ["kubescape.io"]
    resources: ["securityexceptions", "clustersecurityexceptions"]
    verbs: ["get", "list", "watch"]
  {{- end }}
  {{- if eq .Values.capabilities.remediation "enable" }}
  # Post-scan remediation (opt-in). These mutating verbs are granted only when
  # capabilities.remediation is enabled; the default install stays read-only.
  # patch on workloads/pods backs the annotate action; patch on nodes backs the
  # cordon action; networkpolicies back the quarantine action.
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["patch"]
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "delete", "get", "list"]
  {{- end }}
{{- end }}
