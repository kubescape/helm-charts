{{- $kubectlImage := .Values.hostScannerCleanup.image }}
{{- $cleanupName := printf "%s-host-scanner-cleanup" .Release.Name }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $cleanupName }}
  namespace: {{ .Values.ksNamespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-5"
    {{- include "kubescape-operator.annotations" (dict "Values" .Values) | nindent 4 }}
  labels:
    {{- include "kubescape-operator.labels" (dict "Chart" .Chart "Release" .Release "Values" .Values "app" $cleanupName "tier" .Values.global.namespaceTier) | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $cleanupName }}
  namespace: {{ .Values.ksNamespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-5"
    {{- include "kubescape-operator.annotations" (dict "Values" .Values) | nindent 4 }}
  labels:
    {{- include "kubescape-operator.labels" (dict "Chart" .Chart "Release" .Release "Values" .Values "app" $cleanupName "tier" .Values.global.namespaceTier) | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $cleanupName }}
  namespace: {{ .Values.ksNamespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-5"
    {{- include "kubescape-operator.annotations" (dict "Values" .Values) | nindent 4 }}
  labels:
    {{- include "kubescape-operator.labels" (dict "Chart" .Chart "Release" .Release "Values" .Values "app" $cleanupName "tier" .Values.global.namespaceTier) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $cleanupName }}
subjects:
  - kind: ServiceAccount
    name: {{ $cleanupName }}
    namespace: {{ .Values.ksNamespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $cleanupName }}
  namespace: {{ .Values.ksNamespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "0"
    {{- include "kubescape-operator.annotations" (dict "Values" .Values) | nindent 4 }}
  labels:
    {{- include "kubescape-operator.labels" (dict "Chart" .Chart "Release" .Release "Values" .Values "app" $cleanupName "tier" .Values.global.namespaceTier) | nindent 4 }}
spec:
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        {{- include "kubescape-operator.labels" (dict "Chart" .Chart "Release" .Release "Values" .Values "app" $cleanupName "tier" .Values.global.namespaceTier) | nindent 8 }}
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- if kindIs "string" .Values.imagePullSecrets }}
      - name: {{ .Values.imagePullSecrets }}
      {{- else }}
      {{- range .Values.imagePullSecrets }}
      - name: {{ . }}
      {{- end }}
      {{- end }}
      {{- end }}
      serviceAccountName: {{ $cleanupName }}
      automountServiceAccountToken: true
      restartPolicy: OnFailure
      nodeSelector:
      {{- if .Values.hostScannerCleanup.nodeSelector }}
      {{- toYaml .Values.hostScannerCleanup.nodeSelector | nindent 8 }}
      {{- else if .Values.customScheduling.nodeSelector }}
      {{- toYaml .Values.customScheduling.nodeSelector | nindent 8 }}
      {{- end }}
      affinity:
      {{- if .Values.hostScannerCleanup.affinity }}
      {{- toYaml .Values.hostScannerCleanup.affinity | nindent 8 }}
      {{- else if .Values.customScheduling.affinity }}
      {{- toYaml .Values.customScheduling.affinity | nindent 8 }}
      {{- end }}
      tolerations:
      {{- if .Values.hostScannerCleanup.tolerations }}
      {{- toYaml .Values.hostScannerCleanup.tolerations | nindent 8 }}
      {{- else if .Values.customScheduling.tolerations }}
      {{- toYaml .Values.customScheduling.tolerations | nindent 8 }}
      {{- end }}
      {{- include "kubescape-operator.priorityClassName" (dict "component" .Values.hostScannerCleanup "global" .Values.customScheduling) | nindent 6 }}
      containers:
        - name: host-scanner-cleanup
          image: "{{ $kubectlImage.repository }}:{{ $kubectlImage.tag }}"
          imagePullPolicy: {{ $kubectlImage.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          command: ["/bin/sh", "-c"]
          args:
            - kubectl delete daemonset host-scanner -n {{ .Values.ksNamespace }} --ignore-not-found=true
          resources:
            requests:
              cpu: 10m
              memory: 10Mi
            limits:
              cpu: 100m
              memory: 50Mi
