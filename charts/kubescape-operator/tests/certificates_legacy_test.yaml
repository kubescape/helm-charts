suite: Legacy certificate reuse
kubernetesProvider:
  scheme:
    "v1/Secret":
      gvr:
        version: v1
        resource: secrets
      namespaced: true
  objects:
    - kind: Secret
      apiVersion: v1
      metadata:
        name: kubescape-admission-ca
        namespace: kubescape
      data:
        tls.crt: bGVnYWN5LWFkbWlzc2lvbi1jYQ==
        tls.key: bGVnYWN5LWFkbWlzc2lvbi1jYS1rZXk=
    - kind: Secret
      apiVersion: v1
      metadata:
        name: kubescape-admission-webhook.kubescape.svc-kubescape-tls-pair
        namespace: kubescape
      data:
        tls.crt: bGVnYWN5LWFkbWlzc2lvbi10bHM=
        tls.key: bGVnYWN5LWFkbWlzc2lvbi10bHMta2V5
    - kind: Secret
      apiVersion: v1
      metadata:
        name: storage-ca
        namespace: kubescape
      data:
        ca.crt: bGVnYWN5LXN0b3JhZ2UtY2E=
        tls.crt: bGVnYWN5LXN0b3JhZ2UtdGxz
        tls.key: bGVnYWN5LXN0b3JhZ2UtdGxzLWtleQ==
tests:
  - it: reuses legacy admission secrets in helm mode
    template: operator/admission-webhook/secret.yaml
    capabilities:
      apiVersions:
        - batch/v1
    set:
      unittest: true
    asserts:
      - equal:
          path: data["ca.crt"]
          value: bGVnYWN5LWFkbWlzc2lvbi1jYQ==
      - equal:
          path: data["tls.crt"]
          value: bGVnYWN5LWFkbWlzc2lvbi10bHM=
      - equal:
          path: data["tls.key"]
          value: bGVnYWN5LWFkbWlzc2lvbi10bHMta2V5
  - it: reuses the legacy storage secret in helm mode
    template: storage/certgen/secret.yaml
    capabilities:
      apiVersions:
        - batch/v1
    set:
      unittest: true
    asserts:
      - equal:
          path: data["ca.crt"]
          value: bGVnYWN5LXN0b3JhZ2UtY2E=
      - equal:
          path: data["tls.crt"]
          value: bGVnYWN5LXN0b3JhZ2UtdGxz
      - equal:
          path: data["tls.key"]
          value: bGVnYWN5LXN0b3JhZ2UtdGxzLWtleQ==
