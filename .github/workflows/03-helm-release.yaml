name: 03-Helm chart release

on:
  workflow_dispatch:
    inputs:
      CHARTS_NAME:
        type: choice
        description: What chart do you want to release?
        options:
          - kubescape-operator
      HELM_E2E_TEST:
        required: false
        default: true
        type: boolean
      TESTS_BRANCH:
        description: "system tests branch name"
        required: false
        default: "master"
        type: string
      RELEASE_BRANCH:
        description: "branch to release from"
        required: false
        default: "main"
        type: string
      BYPASS_ALLOWLIST_DRIFT:
        description: "Set true to pass the GKE Autopilot allowlist drift gate after you have opened a Gerrit allowlist update"
        required: false
        default: false
        type: boolean

  workflow_call:
    inputs:
      COMMIT_REF:
        required: true
        type: string
      BYPASS_ALLOWLIST_DRIFT:
        required: false
        default: false
        type: boolean
      CHARTS_NAME:
        required: true
        type: string
      HELM_E2E_TEST:
        required: false
        default: true
        type: boolean
      TESTS_BRANCH:
        description: "system tests branch name"
        required: false
        default: "master"
        type: string

jobs:
  e2e-test:
    if: ${{ inputs.HELM_E2E_TEST }}
    with:
      BRANCH: ${{ inputs.RELEASE_BRANCH || 'main' }}
      TESTS_BRANCH: ${{ inputs.TESTS_BRANCH }}
      KS_BRANCH: "master"
    uses: ./.github/workflows/02-e2e-test.yaml
    secrets: inherit

  allowlist-drift-check:
    # Fails the release if the node-agent render drifts from the approved GKE Autopilot
    # allowlist (vendored under gke-allowlist/). Bypass with BYPASS_ALLOWLIST_DRIFT=true
    # after opening a Gerrit allowlist update. See scripts/gke-allowlist/README.md.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.RELEASE_BRANCH || inputs.COMMIT_REF }}
          persist-credentials: false
      - name: Install Helm
        uses: azure/setup-helm@v3.5
        with:
          # Keep in sync with pr-allowlist-drift.yaml — the release gate and the PR check
          # must render with the same Helm or they can disagree. See that workflow for why
          # the default `version: latest` silently installs v3.9.0.
          version: v3.19.0
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install pyyaml
      - name: Check node-agent vs approved allowlist
        run: |
          set +e
          scripts/gke-allowlist/check-drift.sh \
            charts/kubescape-operator \
            gke-allowlist/armo-kubescape-node-agent-1.40-v2.yaml
          rc=$?
          set -e
          # exit 2 = spec-drift (bypassable); 0 = OK; anything else = the check crashed and must not be bypassed.
          if [ "$rc" -eq 0 ]; then
            exit 0
          elif [ "$rc" -eq 2 ]; then
            if [ "${{ inputs.BYPASS_ALLOWLIST_DRIFT }}" = "true" ]; then
              echo "::warning::node-agent drifts from the approved allowlist, but BYPASS_ALLOWLIST_DRIFT=true — ensure a Gerrit allowlist update is open."
              exit 0
            fi
            echo "::error::node-agent drifts from the approved GKE Autopilot allowlist. Open a Gerrit allowlist update, then re-run the release with BYPASS_ALLOWLIST_DRIFT=true."
            exit 1
          else
            echo "::error::allowlist drift check failed to run (exit $rc) — not a drift result, so BYPASS_ALLOWLIST_DRIFT does not apply. Fix the check."
            exit 1
          fi

  helm-chart-release:
    needs: [e2e-test, allowlist-drift-check]
    if: ${{ !cancelled() && (needs.e2e-test.result == 'success' || needs.e2e-test.result == 'skipped') && needs.allowlist-drift-check.result == 'success' }}
    permissions:
      id-token: write      # Required: OIDC token for keyless attestation signing
      contents: write      # Required: chart-releaser creates GitHub Releases and pushes gh-pages index
      attestations: write  # Required: upload attestation to GitHub's transparency log
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.RELEASE_BRANCH || inputs.COMMIT_REF }}
          fetch-depth: 0

      - name: git status
        run: git status

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v3.5
        with:
          # Pinned: this Helm packages the released chart, so it must not drift silently.
          # The default `version: latest` needs a token to resolve and falls back to v3.9.0.
          version: v3.19.0

      - name: Install chart-releaser CLI
        env:
          CR_VERSION: "1.6.1"
        run: |
          curl -sSLo cr.tar.gz \
            "https://github.com/helm/chart-releaser/releases/download/v${CR_VERSION}/chart-releaser_${CR_VERSION}_linux_amd64.tar.gz"
          tar -xzf cr.tar.gz cr
          sudo install -m 755 cr /usr/local/bin/cr
          rm -f cr.tar.gz

      - name: Package charts
        run: |
          mkdir -p .cr-release-packages/
          helm dependency update charts/kubescape-operator
          helm package charts/kubescape-operator --destination .cr-release-packages/

      - name: Attest chart provenance
        if: hashFiles('.cr-release-packages/*.tgz') != ''
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: '.cr-release-packages/*.tgz'

      - name: Publish chart release
        if: hashFiles('.cr-release-packages/*.tgz') != ''
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER}"
          repo="${GITHUB_REPOSITORY#*/}"
          commit="$(git rev-parse HEAD)"
          cr upload \
            --owner "${owner}" \
            --git-repo "${repo}" \
            --token "${CR_TOKEN}" \
            --commit "${commit}" \
            --skip-existing
          mkdir -p .cr-index/
          cr index \
            --owner "${owner}" \
            --git-repo "${repo}" \
            --charts-repo "https://${owner}.github.io/${repo}/" \
            --token "${CR_TOKEN}" \
            --push

      - name: Mark as pre-release
        if: inputs.RELEASE_BRANCH && inputs.RELEASE_BRANCH != 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(grep '^version:' charts/${{ inputs.CHARTS_NAME }}/Chart.yaml | awk '{print $2}')
          gh release edit ${{ inputs.CHARTS_NAME }}-$version --prerelease
