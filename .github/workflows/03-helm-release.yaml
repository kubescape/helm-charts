name: 03-Helm chart release

on:
  workflow_dispatch:
    inputs:
      CHARTS_NAME:
        type: choice
        description: What chart do you want to release?
        options:
          - kubescape-operator
      HELM_E2E_TEST:
        required: false
        default: true
        type: boolean
      TESTS_BRANCH:
        description: "system tests branch name"
        required: false
        default: "master"
        type: string
      RELEASE_BRANCH:
        description: "branch to release from"
        required: false
        default: "main"
        type: string

  workflow_call:
    inputs:
      COMMIT_REF:
        required: true
        type: string
      CHARTS_NAME:
        required: true
        type: string
      HELM_E2E_TEST:
        required: false
        default: true
        type: boolean
      TESTS_BRANCH:
        description: "system tests branch name"
        required: false
        default: "master"
        type: string

jobs:
  e2e-test:
    if: ${{ inputs.HELM_E2E_TEST }}
    with:
      BRANCH: ${{ inputs.RELEASE_BRANCH || 'main' }}
      TESTS_BRANCH: ${{ inputs.TESTS_BRANCH }}
      KS_BRANCH: "master"
    uses: ./.github/workflows/02-e2e-test.yaml
    secrets: inherit

  helm-chart-release:
    needs: e2e-test
    if: ${{ !cancelled() && (needs.e2e-test.result == 'success' || needs.e2e-test.result == 'skipped') }}
    permissions:
      id-token: write      # Required: OIDC token for keyless attestation signing
      contents: write      # Required: chart-releaser creates GitHub Releases and pushes gh-pages index
      attestations: write  # Required: upload attestation to GitHub's transparency log
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.RELEASE_BRANCH || inputs.COMMIT_REF }}
          fetch-depth: 0

      - name: git status
        run: git status

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v3.5
        # with:
        #   version: v3.4.0

      - name: Install chart-releaser CLI
        env:
          CR_VERSION: "1.6.1"
        run: |
          curl -sSLo cr.tar.gz \
            "https://github.com/helm/chart-releaser/releases/download/v${CR_VERSION}/chart-releaser_${CR_VERSION}_linux_amd64.tar.gz"
          tar -xzf cr.tar.gz cr
          sudo install -m 755 cr /usr/local/bin/cr
          rm -f cr.tar.gz

      - name: Package charts
        run: |
          mkdir -p .cr-release-packages/
          helm dependency update charts/kubescape-operator
          helm package charts/kubescape-operator --destination .cr-release-packages/

      - name: Attest chart provenance
        if: hashFiles('.cr-release-packages/*.tgz') != ''
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: '.cr-release-packages/*.tgz'

      - name: Publish chart release
        if: hashFiles('.cr-release-packages/*.tgz') != ''
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER}"
          repo="${GITHUB_REPOSITORY#*/}"
          commit="$(git rev-parse HEAD)"
          cr upload \
            --owner "${owner}" \
            --git-repo "${repo}" \
            --token "${CR_TOKEN}" \
            --commit "${commit}" \
            --skip-existing
          mkdir -p .cr-index/
          cr index \
            --owner "${owner}" \
            --git-repo "${repo}" \
            --charts-repo "https://${owner}.github.io/${repo}/" \
            --token "${CR_TOKEN}" \
            --push

      - name: Mark as pre-release
        if: inputs.RELEASE_BRANCH && inputs.RELEASE_BRANCH != 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(grep '^version:' charts/${{ inputs.CHARTS_NAME }}/Chart.yaml | awk '{print $2}')
          gh release edit ${{ inputs.CHARTS_NAME }}-$version --prerelease
